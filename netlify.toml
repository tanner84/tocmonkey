[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Protect the admin page — redirects /admin to admin.html
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Allow map tiles, Anthropic API, and external resources
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      connect-src 'self' https://bsky.social https://api.bsky.app https://nitter.privacydev.net https://nitter.poast.org https://nitter.cz https://api.anthropic.com https://*.tile.openstreetmap.org https://acleddata.com https://metals-api.com https://www.alphavantage.co https://api.eia.gov;
      img-src 'self' data: https:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      frame-src 'self';
    """

# Ensure functions are accessible
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, x-admin-password"
    Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
