[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."scrapeArticles"]
  schedule = "0 6 * * *"

# SIGACT brief — every 4 hours, rotates through all 6 COCOMs (one per run)
[functions."sigactbrief"]
  schedule = "0 */4 * * *"

# 24-hour SIGACT summary — daily at 14:15 UTC (10:15am EDT), EUCOM+CENTCOM+INDOPACOM
[functions."sigactsummary"]
  schedule = "15 14 * * *"

# TOC SITREP — daily at 18:00 UTC (2pm ET), all 6 COCOMs
[functions."tocsitrep"]
  schedule = "0 18 * * *"

# Maritime SITREP — daily at 01:00 UTC, naval/shipping/chokepoint focus
[functions."maritimesitrep"]
  schedule = "0 1 * * *"

# OCG Brief — organized crime SIGACTs per COCOM, fills schedule gaps
# 03→EUCOM  05→CENTCOM  09→INDOPACOM  14→AFRICOM  17→SOUTHCOM  21→NORTHCOM
[functions."ocgbrief"]
  schedule = "0 3,5,9,14,17,21 * * *"

# ADIZ Brief — daily airspace snapshot, two-stage pipeline (Sonnet+web_search → Haiku→FB)
[functions."adizbrief"]
  schedule = "0 7 * * *"

# NCAA Men's Basketball score cards — two daily runs:
#   AM: 14:40 UTC (9:40am ET) — all overnight finals confirmed
#   PM: 22:00 UTC (5pm ET) — afternoon game finals, before evening slate
[functions."ncaamb-card-am"]
  schedule = "40 14 * * *"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

[functions."ncaamb-card-pm"]
  schedule = "0 22 * * *"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# NBA score card — daily at 13:15 UTC (8:15am ET)
[functions."nba-card"]
  schedule = "15 13 * * *"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# NHL score card — daily at 13:25 UTC (8:25am ET)
[functions."nhl-card"]
  schedule = "25 13 * * *"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# PGA leaderboard card — Thu–Sun at 23:30 UTC (7:30pm ET), top 10 after each round
[functions."pga-card"]
  schedule = "30 23 * * 4,5,6,0"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# UFC Fight Night card — Saturday at 07:00 UTC (3am ET), captures Friday night results
[functions."ufc-card"]
  schedule = "0 7 * * 6"
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# F1 test card — no schedule, trigger manually from Netlify dashboard
[functions."f1-card-test"]
  included_files = ["node_modules/@napi-rs/canvas-linux-x64-gnu/**", "public/**"]

# Market brief — open bell 9:45am EDT (13:45 UTC), close bell 5:30pm EDT (21:30 UTC), weekdays only
[functions."marketbrief-open"]
  schedule = "45 13 * * 1-5"

[functions."marketbrief-close"]
  schedule = "30 21 * * 1-5"

# Protect the admin page — redirects /admin to admin.html
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Allow map tiles, Anthropic API, and external resources
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://bsky.social https://api.bsky.app https://nitter.privacydev.net https://nitter.poast.org https://nitter.cz https://api.anthropic.com https://*.tile.openstreetmap.org https://acleddata.com https://metals-api.com https://www.alphavantage.co https://api.eia.gov https://www.fpri.org https://www.foreignaffairs.com https://warontherocks.com https://www.rand.org https://www.rusi.org https://cepa.org https://www.cna.org https://en.wikipedia.org https://graph.facebook.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data:; frame-src 'self'; object-src 'none';"

# Ensure functions are accessible
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, x-admin-password"
    Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
