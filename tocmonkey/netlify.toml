[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Protect the admin page — redirects /admin to admin.html
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Allow map tiles, Anthropic API, and external resources
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.openstreetmap.org blob:; connect-src 'self' https://api.anthropic.com https://*.tile.openstreetmap.org https://acleddata.com https://bsky.social https://api.bsky.app https://metals-api.com https://www.alphavantage.co https://api.eia.gov; font-src 'self' data:; frame-src 'none'; object-src 'none'"

# Ensure functions are accessible
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, x-admin-password"
    Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
